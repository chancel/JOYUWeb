<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒嶼．全球私藏酒單</title>
    <!-- 引入字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --dark-bg: #1a1a1a;
            --card-bg: #2a2a2a;
            --line-green: #06C755;
            --text-light: #f4f4f4;
            --text-dim: #aaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.6;
        }

        h1, h2, h3, .serif { font-family: 'Noto Serif TC', serif; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Header 樣式 */
        header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            margin-bottom: 40px;
            cursor: pointer;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary-gold);
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        header p { font-weight: 300; letter-spacing: 2px; color: #ccc; }

        /* 按鈕樣式 */
        .back-btn {
            display: inline-block;
            background: transparent;
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--primary-gold); color: #000; }

        /* 首頁 Grid (FB + 國家卡片) */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s ease;
            cursor: pointer;
            height: 400px;
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.5s; }
        .card:hover img { opacity: 0.4; transform: scale(1.05); }

        .card-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 30px 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            text-align: center;
        }

        .card-info h2 { color: var(--primary-gold); font-size: 1.8rem; margin: 0; }

        /* FB 專屬卡片 */
        .fb-card { background: #fff; display: flex; align-items: center; justify-content: center; }

        /* 國家內部清單頁面 */
        .type-group { margin-bottom: 50px; }
        .type-title {
            font-size: 1.8rem;
            color: var(--primary-gold);
            border-bottom: 1px solid var(--primary-gold);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .wine-list-item {
            background: var(--card-bg);
            margin-bottom: 12px;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            border-left: 0 solid var(--primary-gold);
        }

        .wine-list-item:hover {
            background: #333;
            border-left: 5px solid var(--primary-gold);
            padding-left: 25px;
        }

        .wine-list-item span { font-size: 1.1rem; }
        .wine-list-item::after { content: '→'; color: var(--primary-gold); font-weight: bold; }

        /* 詳細頁面樣式 */
        .detail-container { display: flex; flex-wrap: wrap; gap: 40px; margin-top: 20px; }
        .detail-img { flex: 1; min-width: 300px; border-radius: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid #444; object-fit: cover; max-height: 600px; }
        .detail-text { flex: 1.2; min-width: 300px; }
        .detail-text h2 { font-size: 2.5rem; color: var(--primary-gold); margin-bottom: 20px; }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: #222;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            gap: 15px;
        }
        .info-item strong { color: var(--primary-gold); display: block; font-size: 0.9rem; text-transform: uppercase; }
        .info-item span { font-size: 1.2rem; }

        .intro-box { font-size: 1.1rem; line-height: 1.8; color: #ddd; white-space: pre-line; }

        /* LINE 懸浮按鈕 */
        .line-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--line-green);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            z-index: 999;
            transition: 0.3s;
        }
        .line-float:hover { transform: scale(1.05); background-color: #05a346; }

        /* Footer 樣式 */
        footer {
            margin-top: 80px;
            padding: 40px 20px;
            text-align: center;
            background-color: #111;
            border-top: 1px solid #333;
        }

        .warning-text {
            color: #fff;
            background: #c00;
            display: inline-block;
            padding: 5px 20px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .copyright { color: #666; font-size: 0.8rem; margin-top: 10px; }

        /* 頁面切換動畫 */
        #home-page, #country-page, #detail-page { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .detail-container { flex-direction: column; }
            header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header onclick="showHome()">
    <div class="container">
        <h1>酒嶼．頂級窖藏</h1>
        <p>每一款酒就像一個島嶼，每次開瓶就像一次探險，酒嶼網羅世界的好酒，讓美食與美酒帶著您與好友們一同，共創美好回憶。</p>
    </div>
</header>

<div class="container">
    <!-- 1. 首頁 -->
    <div id="home-page" style="display: block;">
        <div class="main-grid" id="main-grid">
            <!-- 第一格：FB 粉絲專頁 (請替換 href 網址) -->
            <div class="card fb-card">
                <iframe src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Fprofile.php%3Fid%3D61574989306812&tabs=timeline&width=340&height=400&small_header=true&adapt_container_width=true&hide_cover=true&show_facepile=true&appId" width="340" height="400" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
                <!-- <iframe src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Fprofile.php%3Fid%3D61574989306812&tabs=timeline&width=340&height=400&small_header=true&adapt_container_width=true&hide_cover=false&show_facepile=false&appId" 
                width="340" height="400" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe> -->
            </div>
        </div>
    </div>

    <!-- 2. 國家分頁 -->
    <div id="country-page" style="display: none;">
        <button class="back-btn" onclick="showHome()">← 返回國家選擇</button>
        <h2 id="current-country-name" class="serif" style="font-size: 2.5rem; color: var(--primary-gold); margin-bottom: 30px;"></h2>
        <div id="country-content"></div>
    </div>

    <!-- 3. 詳細頁面 -->
    <div id="detail-page" style="display: none;">
        <button class="back-btn" id="back-to-list-btn">← 返回清單</button>
        <div id="detail-render"></div>
    </div>
</div>

<a href="https://line.me/R/ti/p/@757zwauo" class="line-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" width="24"> 立即諮詢
</a>

<footer>
     <p>【禁止酒駕，酒後不開車，安全有保障】</p>
    <div class="copyright">
        &copy; 2026 酒嶼有限公司 All Rights Reserved. <br>
        未滿十八歲禁止飲酒。
    </div>
</footer>

<script>
    // ！！！在此貼上你的 Google Sheets CSV 網址！！！
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSYKqEVWsLFC6akeRezrg-siBSNugYjR3KB_gLWD1WD_2kG-lC1d5Ceiuw7Bgj8sIxJofDvEKD-YwaF/pub?gid=0&single=true&output=csv'; 
    
    let wineData = [];

    async function fetchData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1);
            
            wineData = rows.map(row => {
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                if (!cols || cols.length < 8) return null;
                return {
                    id: cols[0]?.replace(/"/g, '').trim(),
                    name: cols[1]?.replace(/"/g, '').trim(),
                    image: cols[2]?.replace(/"/g, '').trim(),
                    intro: cols[3]?.replace(/"/g, '').trim(),
                    alcohol: cols[4]?.replace(/"/g, '').trim(),
                    origin: cols[5]?.replace(/"/g, '').trim(),
                    short_desc: cols[6]?.replace(/"/g, '').trim(),
                    type: cols[7]?.replace(/"/g, '').trim() || "精選佳釀",
                    country: cols[8]?.replace(/"/g, '').trim() || "全球收藏"
                };
            }).filter(item => item !== null);

            renderHome();
        } catch (e) {
            console.error("載入失敗", e);
        }
    }

    function renderHome() {
        const grid = document.getElementById('main-grid');
        const countries = [...new Set(wineData.map(item => item.country))];
        
        // 保留 FB 卡片，清空其餘
        const fbCard = grid.firstElementChild;
        grid.innerHTML = '';
        grid.appendChild(fbCard);

        countries.forEach(country => {
            const firstWine = wineData.find(w => w.country === country);
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => showCountry(country);
            div.innerHTML = `
                <img src="${firstWine.image}">
                <div class="card-info"><h2>${country}</h2></div>
            `;
            grid.appendChild(div);
        });
        switchPage('home-page');
    }

    function showCountry(country) {
        document.getElementById('current-country-name').innerText = country;
        const container = document.getElementById('country-content');
        container.innerHTML = '';

        const countryWines = wineData.filter(w => w.country === country);
        const types = [...new Set(countryWines.map(w => w.type))];

        types.forEach(type => {
            const winesInType = countryWines.filter(w => w.type === type);
            const typeSection = document.createElement('div');
            typeSection.className = 'type-group';
            typeSection.innerHTML = `
                <div class="type-title">${type}</div>
                ${winesInType.map(w => `
                    <div class="wine-list-item" onclick="showDetail('${w.id}')">
                        <span>${w.name}</span>
                    </div>
                `).join('')}
            `;
            container.appendChild(typeSection);
        });
        switchPage('country-page');
    }

    function showDetail(id) {
        const wine = wineData.find(w => w.id === id);
        const render = document.getElementById('detail-render');
        
        document.getElementById('back-to-list-btn').onclick = () => showCountry(wine.country);

        render.innerHTML = `
            <div class="detail-container">
                <img src="${wine.image}" class="detail-img">
                <div class="detail-text">
                    <h2>${wine.name}</h2>
                    <p style="color:var(--primary-gold); margin-bottom:20px; font-size:1.2rem;">${wine.short_desc}</p>
                    
                    <div class="info-grid">
                        <div class="info-item"><strong>產地 ORIGIN</strong><span>${wine.origin}</span></div>
                        <div class="info-item"><strong>酒精度 ALC.</strong><span>${wine.alcohol}</span></div>
                    </div>

                    <div class="intro-box">
                        <h3 style="color:var(--primary-gold); margin-bottom:10px;">商品介紹</h3>
                        <p>${wine.intro}</p>
                    </div>
                </div>
            </div>
        `;
        switchPage('detail-page');
    }

    function showHome() { switchPage('home-page'); }

    function switchPage(pageId) {
        ['home-page', 'country-page', 'detail-page'].forEach(id => {
            document.getElementById(id).style.display = (id === pageId) ? 'block' : 'none';
        });
        window.scrollTo(0,0);
    }

    fetchData();
</script>

</body>
</html>
